<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Lucy Charlotte Nicholls</title>
    <meta name="description"
        content="Oops! The page you're looking for doesn't exist. Head back to Lucy Charlotte Nicholls' website.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-dark: #343331;
            --color-light: #faf5f5;
            --color-coral: #f49895;
            --color-blue: #374ef2;
            --font-heading: 'Bebas Neue', sans-serif;
            --font-body: 'Poppins', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-body);
            color: var(--color-dark);
            background-color: var(--color-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .error-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* Floating gradient orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            will-change: transform;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(244, 152, 149, 0.45) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation: orbFloat1 14s ease-in-out infinite;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(55, 78, 242, 0.35) 0%, transparent 70%);
            bottom: -15%;
            right: -10%;
            animation: orbFloat2 18s ease-in-out infinite;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(244, 152, 149, 0.3) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orbFloat3 12s ease-in-out infinite;
        }

        @keyframes orbFloat1 {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(60px, 40px) scale(1.1);
            }

            66% {
                transform: translate(-30px, 60px) scale(0.95);
            }
        }

        @keyframes orbFloat2 {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(-50px, -30px) scale(1.05);
            }

            66% {
                transform: translate(40px, -50px) scale(0.9);
            }
        }

        @keyframes orbFloat3 {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.3);
            }
        }

        /* Subtle grid pattern overlay */
        .error-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(55, 78, 242, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(55, 78, 242, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridShift 20s linear infinite;
        }

        @keyframes gridShift {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(60px, 60px);
            }
        }

        /* ===== HEADER ===== */
        .header-404 {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(244, 152, 149, 0.15);
            padding: 0.85rem 2rem;
        }

        .header-404-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-404 {
            font-family: var(--font-heading);
            font-size: 1.65rem;
            color: var(--color-dark);
            text-decoration: none;
            letter-spacing: 2px;
            transition: var(--transition);
        }

        .logo-404:hover {
            color: var(--color-blue);
        }

        .logo-404 span {
            color: var(--color-blue);
        }

        .back-home-link {
            font-family: var(--font-body);
            font-weight: 500;
            color: var(--color-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            border: 1.5px solid rgba(52, 51, 49, 0.15);
        }

        .back-home-link:hover {
            color: var(--color-blue);
            border-color: var(--color-blue);
            transform: translateX(-4px);
        }

        .back-home-link svg {
            width: 1em;
            height: 1em;
            transition: var(--transition);
        }

        .back-home-link:hover svg {
            transform: translateX(-3px);
        }

        /* ===== MAIN CONTENT ===== */
        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 700px;
            width: 100%;
        }

        /* Glassy card */
        .error-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            padding: 3.5rem 3rem 3rem;
            box-shadow:
                0 25px 60px rgba(55, 78, 242, 0.08),
                0 8px 20px rgba(244, 152, 149, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: cardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            position: relative;
            overflow: hidden;
        }

        /* Shimmer border effect */
        .error-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            background: linear-gradient(135deg, var(--color-coral), var(--color-blue), var(--color-coral), var(--color-blue));
            background-size: 300% 300%;
            animation: shimmer 6s ease-in-out infinite;
            z-index: -1;
            opacity: 0.35;
        }

        .error-card::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 31px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: -1;
        }

        @keyframes shimmer {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== 404 NUMBER ===== */
        .error-number {
            font-family: var(--font-heading);
            font-size: 10rem;
            line-height: 1;
            letter-spacing: 6px;
            margin-bottom: 0.25rem;
            position: relative;
            display: inline-block;
            animation: numberEntry 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .error-number span {
            display: inline-block;
            background: linear-gradient(135deg, var(--color-coral) 0%, var(--color-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        /* Glitch flicker on the "0" */
        .error-number .zero {
            animation: glitch 4s ease-in-out infinite;
        }

        @keyframes glitch {

            0%,
            90%,
            100% {
                transform: translate(0);
                opacity: 1;
            }

            92% {
                transform: translate(-3px, 2px);
                opacity: 0.8;
            }

            94% {
                transform: translate(3px, -1px);
                opacity: 0.9;
            }

            96% {
                transform: translate(-2px, -2px);
                opacity: 0.85;
            }

            98% {
                transform: translate(2px, 1px);
                opacity: 1;
            }
        }

        @keyframes numberEntry {
            from {
                opacity: 0;
                transform: scale(0.5);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        /* Decorative gradient line under the number */
        .error-divider {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--color-coral) 0%, var(--color-blue) 100%);
            border-radius: 2px;
            margin: 0.75rem auto 1.5rem;
            animation: dividerEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        @keyframes dividerEntry {
            from {
                width: 0;
                opacity: 0;
            }

            to {
                width: 80px;
                opacity: 1;
            }
        }

        /* ===== TITLE & DESCRIPTION ===== */
        .error-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--color-dark);
            margin-bottom: 0.75rem;
            letter-spacing: 2px;
            animation: textEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        }

        .error-description {
            font-size: 1.1rem;
            color: var(--color-dark);
            opacity: 0.7;
            line-height: 1.7;
            margin-bottom: 2rem;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
            animation: textEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
        }

        @keyframes textEntry {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== BUTTONS ===== */
        .error-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: textEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
        }

        .btn-404-primary,
        .btn-404-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.925rem 2.25rem;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            border-radius: 50px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-404-primary {
            background: linear-gradient(135deg, var(--color-coral) 0%, var(--color-blue) 100%);
            color: white;
            border-color: transparent;
        }

        .btn-404-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--color-blue) 0%, var(--color-coral) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 50px;
        }

        .btn-404-primary:hover::before {
            opacity: 1;
        }

        .btn-404-primary span {
            position: relative;
            z-index: 1;
        }

        .btn-404-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(244, 152, 149, 0.35);
        }

        .btn-404-secondary {
            background: rgba(255, 255, 255, 0.7);
            color: var(--color-blue);
            border-color: rgba(55, 78, 242, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .btn-404-secondary:hover {
            background: var(--color-blue);
            color: white;
            border-color: var(--color-blue);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(55, 78, 242, 0.25);
        }

        .btn-icon {
            width: 1.1em;
            height: 1.1em;
            transition: var(--transition);
        }

        .btn-404-primary:hover .btn-icon {
            transform: translateX(3px);
        }

        .btn-404-secondary:hover .btn-icon {
            transform: translateX(-3px);
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .error-number {
                font-size: 7rem;
            }

            .error-title {
                font-size: 2rem;
            }

            .error-description {
                font-size: 1rem;
            }

            .error-card {
                padding: 2.5rem 1.75rem 2.25rem;
                border-radius: 24px;
                margin: 0 0.5rem;
            }

            .error-card::before {
                border-radius: 26px;
            }

            .error-card::after {
                border-radius: 23px;
            }

            .header-404 {
                padding: 0.75rem 1.25rem;
            }

            .logo-404 {
                font-size: 1.35rem;
            }

            .back-home-link {
                font-size: 0.85rem;
                padding: 0.4rem 1rem;
            }
        }

        @media (max-width: 480px) {
            .error-number {
                font-size: 5.5rem;
                letter-spacing: 3px;
            }

            .error-title {
                font-size: 1.65rem;
            }

            .error-description {
                font-size: 0.95rem;
            }

            .error-card {
                padding: 2rem 1.25rem 1.75rem;
            }

            .error-buttons {
                flex-direction: column;
                gap: 0.75rem;
            }

            .btn-404-primary,
            .btn-404-secondary {
                width: 100%;
                padding: 0.875rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header-404">
        <div class="header-404-inner">
            <a href="/" class="logo-404">Lucy Charlotte <span>Nicholls</span></a>
            <a href="/" class="back-home-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M19 12H5" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
                Back to Home
            </a>
        </div>
    </header>

    <!-- Animated Background -->
    <div class="error-bg" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Floating Particles -->
    <div class="particles" id="particles" aria-hidden="true"></div>

    <!-- Main Content -->
    <main class="error-container">
        <div class="error-card">
            <div class="error-number">
                <span>4</span><span class="zero">0</span><span>4</span>
            </div>
            <div class="error-divider"></div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">
                Looks like this page has wandered off on its own healing journey. Let's get you back on track.
            </p>
            <div class="error-buttons">
                <a href="/" class="btn-404-primary" id="btn-go-home">
                    <span>Go Home</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </a>
                <a href="https://wa.me/447392170894" target="_blank" rel="noopener noreferrer"
                    class="btn-404-secondary" id="btn-contact">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2zm0 1.67c2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 0 1 2.41 5.82c0 4.54-3.7 8.23-8.24 8.23-1.48 0-2.93-.4-4.19-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.18 8.18 0 0 1-1.26-4.37c0-4.54 3.7-8.24 8.25-8.24zm-3.62 4.41c-.17 0-.45.06-.69.31-.24.25-.91.89-.91 2.17 0 1.28.93 2.52 1.06 2.69.13.17 1.83 2.79 4.43 3.91.62.27 1.1.43 1.48.55.62.2 1.19.17 1.64.1.5-.07 1.54-.63 1.76-1.24.22-.61.22-1.13.15-1.24-.06-.11-.24-.17-.5-.3-.26-.13-1.54-.76-1.78-.85-.24-.09-.41-.13-.59.13-.17.25-.67.85-.83 1.02-.15.17-.3.19-.56.06-.26-.13-1.1-.4-2.09-1.29-.77-.69-1.29-1.54-1.44-1.8-.15-.26-.02-.4.11-.53.12-.12.26-.3.39-.46.13-.15.17-.26.26-.43.09-.17.04-.32-.02-.45-.06-.13-.58-1.42-.8-1.94-.21-.51-.42-.44-.58-.45-.15-.01-.32-.01-.49-.01z" />
                    </svg>
                    Message Me
                </a>
            </div>
        </div>
    </main>

    <script>
        // Generate floating particles
        (function () {
            const container = document.getElementById('particles');
            const colors = ['#f49895', '#374ef2', '#f4c898', '#a374f2'];
            const count = 20;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 6 + 2;
                const left = Math.random() * 100;
                const delay = Math.random() * 15;
                const duration = Math.random() * 12 + 10;
                const color = colors[Math.floor(Math.random() * colors.length)];

                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${left}%;
                    background: ${color};
                    animation-delay: ${delay}s;
                    animation-duration: ${duration}s;
                    box-shadow: 0 0 ${size * 2}px ${color}40;
                `;
                container.appendChild(particle);
            }
        })();
    </script>
</body>

</html>
